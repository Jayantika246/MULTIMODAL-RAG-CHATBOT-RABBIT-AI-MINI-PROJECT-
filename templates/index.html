<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="hero-section">
        <h1 class="hero-title">AI Travel Planner</h1>
        <p class="hero-subtitle">Plan smarter. Travel better.</p>
    </div>

    <div class="container">
        <div class="chat-container">
            <div class="chat-history" id="chatHistory"></div>
            
            <div class="input-section">
                <textarea 
                    id="questionInput" 
                    placeholder="Ask me anything about travel destinations..."
                    rows="3"
                ></textarea>
                <div class="button-group">
                    <button id="voiceButton" class="voice-button" title="Click to speak">
                        🎤 Voice
                    </button>
                    <button id="askButton" class="gradient-button">
                        <span>Ask Question</span>
                    </button>
                    <button onclick="clearSession()" class="clear-button">
                        Clear Chat
                    </button>
                </div>
            </div>

            <div id="loadingIndicator" class="loading-indicator hidden">
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <p>Finding the best travel insights...</p>
            </div>

            <div id="resultsSection" class="results-section hidden">
                <div class="answer-card">
                    <h3>Answer</h3>
                    <div id="answerContent"></div>
                </div>

                <div class="sources-card">
                    <h3>Retrieved Sources</h3>
                    <div id="sourcesContent"></div>
                </div>
            </div>
        </div>

        <div class="ingest-section">
            <h2>Add Travel Documents</h2>
            
            <!-- PDF Upload -->
            <div class="pdf-upload-section">
                <label for="pdfUpload" class="upload-btn">
                    📄 Upload PDF (Travel Guide, Brochure, Itinerary)
                    <input type="file" id="pdfUpload" accept=".pdf" style="display: none;">
                </label>
                <div id="pdfStatus" class="status-message hidden"></div>
            </div>
            
            <!-- Image Upload with Caption -->
            <div class="image-upload-section">
                <label for="imageUpload" class="upload-btn">
                    🖼️ Upload Image (Place, Landmark, Menu, Map)
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                </label>
                <input 
                    type="text" 
                    id="imageCaption" 
                    placeholder="Describe the image in detail (e.g., 'Palolem Beach in South Goa with white sand, palm trees, and calm waters perfect for swimming and kayaking')"
                    class="caption-input hidden"
                    style="margin-top: 10px; padding: 10px; width: 100%; border: 2px solid #4A90E2; border-radius: 8px;"
                />
                <button id="uploadImageBtn" class="secondary-button hidden" style="margin-top: 10px;">
                    <span>Upload Image</span>
                </button>
                <div id="imageStatus" class="status-message hidden"></div>
            </div>
            
            <!-- Text Input -->
            <textarea 
                id="documentInput" 
                placeholder="Or add travel information (one document per line)..."
                rows="4"
            ></textarea>
            <button id="ingestButton" class="secondary-button">
                <span>Add Text Documents</span>
            </button>
            <div id="ingestStatus" class="status-message hidden"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}?v=2"></script>
</body>
</html>
